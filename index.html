<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WTFHealth — Daily Health Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230F766E'/%3E%3Cpath d='M4.5 13H8l1-2 2 4.2 2-6 1.4 3.8H19.5' fill='none' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F4F6F8; --surface:#FFFFFF; --ink:#14202B; --muted:#66727E; --line:#E6EAEE;
    --accent:#0F766E; --accent-soft:#E6F2F0; --accent-bright:#14A38B; --amber:#C77D2E; --danger:#C2492F;
    --shadow:0 1px 2px rgba(20,32,43,.04),0 8px 24px rgba(20,32,43,.06);
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Poppins',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;font-weight:400;-webkit-font-smoothing:antialiased;padding-bottom:64px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  b{font-weight:600}
  .hidden{display:none!important}

  header{position:sticky;top:0;z-index:30;background:rgba(244,246,248,.82);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 0}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto;min-width:0}
  .mark{width:34px;height:34px;border-radius:10px;flex:none;background:linear-gradient(140deg,var(--accent),var(--accent-bright));display:grid;place-items:center;color:#fff}
  .mark svg{width:20px;height:20px}
  .brand h1{font-size:17px;font-weight:600;letter-spacing:-.01em}
  .brand .who{display:block;font-size:11.5px;color:var(--muted);font-weight:400}
  .btn{font-family:inherit;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 13px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:#cfd6dc;background:#fbfcfd}
  .btn svg{width:15px;height:15px}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#0c6358;border-color:#0c6358}
  .btn.icon{padding:9px}
  .btn .lbl{display:inline}
  @media(max-width:600px){.btn .lbl{display:none}}

  .migrate{display:flex;align-items:center;gap:14px;background:linear-gradient(150deg,#0F766E,#14A38B);color:#fff;border-radius:14px;padding:14px 18px;margin-top:22px}
  .migrate p{font-size:13px;font-weight:500;margin-right:auto}
  .migrate .btn{background:#fff;color:var(--accent);border-color:#fff}
  .migrate .x{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px}
  .errbar{display:none;background:#FBEEEB;border:1px solid #F0CFC8;color:#8a3320;border-radius:14px;padding:14px 18px;margin-top:22px;font-size:13px;line-height:1.5}
  .errbar.on{display:block}
  .errbar b{color:#7a2a18}
  .errbar code{background:#fff;border:1px solid #F0CFC8;border-radius:6px;padding:1px 6px;font-size:12px}

  section{margin-top:30px}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
  .sec-head h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
  .sec-head .rule{flex:1;height:1px;background:var(--line)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

  .insights{padding:18px 20px 8px}
  .ins{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
  .ins:last-child{border-bottom:none}
  .ins .ic{width:30px;height:30px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex:none}
  .ins .ic svg{width:16px;height:16px}
  .ins p{font-size:14px;line-height:1.45;padding-top:4px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .lab{font-size:11.5px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px}
  .kpi .lab i{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:none}
  .kpi .val{font-size:27px;font-weight:600;letter-spacing:-.02em;margin-top:9px;line-height:1.1}
  .kpi .val u{font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;margin-left:3px}
  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:4px;min-height:16px}
  .kpi.hero{background:linear-gradient(150deg,#0F766E,#14A38B);border-color:transparent;color:#fff;grid-column:span 2}
  .kpi.hero .lab,.kpi.hero .sub{color:rgba(255,255,255,.82)}
  .kpi.hero .lab i{background:#fff}.kpi.hero .val u{color:rgba(255,255,255,.8)}
  .delta{font-weight:600}.delta.down{color:var(--accent)}.delta.up{color:var(--amber)}
  .kpi.hero .delta.down,.kpi.hero .delta.up{color:#fff}

  .chart-panel{padding:20px 20px 12px}
  .chart-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px;flex-wrap:wrap}
  .chart-top .now{font-size:24px;font-weight:600;letter-spacing:-.02em}
  .chart-top .now u{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500}
  .chart-top .meta{font-size:12px;color:var(--muted);text-align:right}
  svg.chart{width:100%;height:230px;display:block}
  .gl{stroke:var(--line);stroke-width:1}
  .axlab{fill:var(--muted);font-size:10.5px}

  .viz{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
  .viz .panel{padding:18px 20px 20px}
  .viz h3{font-size:14px;font-weight:600;margin-bottom:14px}
  .viz-empty{font-size:12.5px;color:var(--muted);padding:18px 0;text-align:center;line-height:1.5}
  .gb-top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}
  .gb-top .gb-cur{color:var(--accent);font-weight:600}
  .gb-track{position:relative;height:12px;background:#eef1f3;border-radius:8px;overflow:visible}
  .gb-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent-bright));transition:width .5s ease}
  .gb-marker{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--accent);transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(15,118,110,.35);transition:left .5s ease}
  .gb-sub{font-size:12px;color:var(--muted);margin-top:14px}.gb-sub b{color:var(--ink)}
  .ab{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:6px}
  .ab-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
  .ab-bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--accent-bright),var(--accent));border-radius:7px 7px 4px 4px;position:relative;display:flex;justify-content:center;min-height:6px;transition:height .4s ease}
  .ab-bar span{position:absolute;top:-17px;font-size:10.5px;font-weight:600;color:var(--ink);white-space:nowrap}
  .ab-lab{font-size:11px;color:var(--muted);text-transform:uppercase}

  .cols{display:grid;grid-template-columns:minmax(0,360px) minmax(0,1fr);gap:20px;align-items:start}
  .form{padding:20px}
  .form h3{font-size:15px;font-weight:600;margin-bottom:2px}
  .form .hint{font-size:12px;color:var(--muted);margin-bottom:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:500;margin-bottom:6px}
  .field label em{color:var(--muted);font-style:normal;font-weight:400}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  input,textarea{font-family:inherit;font-size:14px;color:var(--ink);width:100%;border:1px solid var(--line);background:#fbfcfd;border-radius:10px;padding:10px 12px;transition:.15s}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
  textarea{resize:vertical;min-height:62px}
  input[type=file]{padding:8px;font-size:12.5px;color:var(--muted);cursor:pointer}
  input[type=file]::file-selector-button{font-family:inherit;font-size:12px;font-weight:500;margin-right:10px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:6px 11px;border-radius:8px;cursor:pointer}
  .scale{display:flex;gap:6px}
  .scale button{flex:1;font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);border:1px solid var(--line);background:#fbfcfd;border-radius:9px;padding:8px 0;cursor:pointer;transition:.12s}
  .scale button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .preview{margin-top:8px;display:none}
  .preview img{max-height:120px;border-radius:10px;border:1px solid var(--line);display:block}
  .form .btn.primary{width:100%;justify-content:center;margin-top:6px;padding:12px}

  .hist{padding:6px 0 8px}
  .hist .head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px}
  .hist .head h3{font-size:15px;font-weight:600}
  .hist .head small{font-size:12px;color:var(--muted)}
  .row{display:grid;grid-template-columns:54px 1fr auto;gap:14px;align-items:center;padding:11px 20px;border-top:1px solid var(--line)}
  .thumb{width:54px;height:54px;border-radius:11px;object-fit:cover;background:var(--accent-soft);border:1px solid var(--line);cursor:pointer;display:grid;place-items:center;color:var(--accent)}
  .thumb.ph{cursor:default}.thumb.ph svg{width:20px;height:20px;opacity:.5}
  .row .info .w{font-size:16px;font-weight:600}.row .info .w u{font-size:12px;font-weight:500;color:var(--muted);text-decoration:none;margin-left:2px}
  .row .info .d{font-size:12px;color:var(--muted);margin-top:1px}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .tag{font-size:11px;color:var(--muted);background:#f3f5f7;border-radius:6px;padding:2px 7px}
  .chg{font-size:13px;font-weight:600;text-align:right;min-width:58px}
  .chg.down{color:var(--accent)}.chg.up{color:var(--amber)}
  .chg small{display:block;font-size:10.5px;color:var(--muted);font-weight:400}
  .del{border:none;background:none;color:#c2c9cf;cursor:pointer;padding:6px;border-radius:8px;display:grid;place-items:center;transition:.12s}
  .del:hover{color:var(--danger);background:#fbeeeb}.del svg{width:15px;height:15px}
  .empty{text-align:center;padding:46px 24px;color:var(--muted)}
  .empty svg{width:38px;height:38px;color:#c4cdd4;margin-bottom:12px}
  .empty p{font-size:14px;font-weight:500;color:var(--ink)}.empty span{font-size:12.5px}

  dialog{border:none;border-radius:18px;padding:0;max-width:380px;width:calc(100% - 32px);box-shadow:0 24px 60px rgba(20,32,43,.22)}
  dialog::backdrop{background:rgba(20,32,43,.32);backdrop-filter:blur(2px)}
  .dlg{padding:22px}
  .dlg h3{font-size:16px;font-weight:600;margin-bottom:3px}
  .dlg p{font-size:12.5px;color:var(--muted);margin-bottom:18px}
  .dlg .row2{display:flex;gap:10px;margin-top:18px}
  .dlg .row2 .btn{flex:1;justify-content:center;padding:11px}

  .lb{position:fixed;inset:0;background:rgba(15,23,30,.86);z-index:60;display:none;place-items:center;padding:24px;cursor:zoom-out}
  .lb.on{display:grid}
  .lb img{max-width:100%;max-height:88vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .lb .cap{position:absolute;bottom:22px;left:0;right:0;text-align:center;color:rgba(255,255,255,.85);font-size:13px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:860px){.cols{grid-template-columns:1fr}.viz{grid-template-columns:1fr}.kpi.hero{grid-column:span 2}}
  @media(max-width:560px){.wrap{padding:0 14px}.kpis{grid-template-columns:1fr 1fr}.kpi .val{font-size:23px}.kpi.hero{grid-column:span 2}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.5 12H8l1-2 2 4 2-5 1 3h4.5"/></svg></div>
      <div style="min-width:0"><h1>WTFHealth</h1><span class="who">Daily health tracker</span></div>
    </div>
    <button class="btn icon" id="exportBtn" title="Download a backup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg><span class="lbl">Export</span></button>
    <button class="btn icon" id="settingsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="lbl">Setup</span></button>
  </div>
</header>

<div class="wrap">
  <div class="migrate hidden" id="migrateBar">
    <p id="migrateText"></p>
    <button class="btn" id="migrateBtn">Import now</button>
    <button class="x" id="migrateDismiss" title="Dismiss">&times;</button>
  </div>
  <div class="errbar" id="errBar"></div>

  <section><div class="sec-head"><h2>Insights</h2><div class="rule"></div></div>
    <div class="panel insights" id="insightsList"></div></section>

  <section><div class="sec-head"><h2>Overview</h2><div class="rule"></div></div>
    <div class="kpis" id="kpis"></div></section>

  <section><div class="sec-head"><h2>Weight trend</h2><div class="rule"></div></div>
    <div class="panel chart-panel">
      <div class="chart-top">
        <div><div class="now" id="chartNow">—</div><div style="font-size:12px;color:var(--muted)">Latest weight</div></div>
        <div class="meta" id="chartMeta"></div>
      </div>
      <svg class="chart" id="chart" preserveAspectRatio="none"></svg>
    </div>
    <div class="viz">
      <div class="panel"><h3>Progress to goal</h3><div id="goalBar"></div></div>
      <div class="panel"><h3>Activity — last 7 logs</h3><div id="activityBars"></div></div>
    </div>
  </section>

  <section><div class="sec-head"><h2>Daily log</h2><div class="rule"></div></div>
    <div class="cols">
      <div class="panel form">
        <h3>Log today</h3>
        <p class="hint">Weight is all you need. Everything else is optional.</p>
        <div class="field"><label>Date</label><input type="date" id="f_date" /></div>
        <div class="grid2">
          <div class="field"><label>Weight <em>(kg)</em></label><input type="number" step="0.1" id="f_weight" placeholder="—" inputmode="decimal" /></div>
          <div class="field"><label>Waist <em>(cm)</em></label><input type="number" step="0.1" id="f_waist" placeholder="—" inputmode="decimal" /></div>
        </div>
        <div class="field"><label>Progress photo <em>(optional)</em></label>
          <input type="file" id="f_photo" accept="image/*" />
          <div class="preview" id="f_preview"><img id="f_previewImg" alt="Selected photo preview" /></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Steps</label><input type="number" id="f_steps" placeholder="—" inputmode="numeric" /></div>
          <div class="field"><label>Water <em>(L)</em></label><input type="number" step="0.1" id="f_water" placeholder="—" inputmode="decimal" /></div>
        </div>
        <div class="field"><label>Sleep <em>(hours)</em></label><input type="number" step="0.1" id="f_sleep" placeholder="—" inputmode="decimal" /></div>
        <div class="field"><label>Energy <em>(low → high)</em></label>
          <div class="scale" id="f_energy" data-val="0"><button type="button" data-n="1">1</button><button type="button" data-n="2">2</button><button type="button" data-n="3">3</button><button type="button" data-n="4">4</button><button type="button" data-n="5">5</button></div></div>
        <div class="field"><label>Hunger <em>(low → high)</em></label>
          <div class="scale" id="f_hunger" data-val="0"><button type="button" data-n="1">1</button><button type="button" data-n="2">2</button><button type="button" data-n="3">3</button><button type="button" data-n="4">4</button><button type="button" data-n="5">5</button></div></div>
        <div class="field"><label>Notes <em>(food, how the day felt)</em></label><textarea id="f_notes" placeholder="What you ate, mood, anything worth remembering…"></textarea></div>
        <button class="btn primary" id="saveBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Save entry</button>
      </div>
      <div class="panel hist">
        <div class="head"><h3>History</h3><small id="histCount"></small></div>
        <div id="histList"></div>
      </div>
    </div>
  </section>
</div>

<dialog id="settingsDlg"><div class="dlg">
  <h3>Setup</h3><p>Used for BMI and goal progress.</p>
  <div class="field"><label>Height <em>(cm)</em></label><input type="number" step="0.1" id="s_height" placeholder="e.g. 183" inputmode="decimal" /></div>
  <div class="field"><label>Goal weight <em>(kg, optional)</em></label><input type="number" step="0.1" id="s_goal" placeholder="set your own target" inputmode="decimal" /></div>
  <div class="row2"><button class="btn" id="settingsCancel">Cancel</button><button class="btn primary" id="settingsSave">Save setup</button></div>
</div></dialog>

<div class="lb" id="lightbox"><img id="lbImg" alt="Progress photo" /><div class="cap" id="lbCap"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ CONFIG ============ */
const SUPABASE_URL  = 'https://enyesotijvpsymyyvthw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVueWVzb3RpanZwc3lteXl2dGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MjYzMzgsImV4cCI6MjA5NTAwMjMzOH0.THFwoONNZ5O6B75xGo09U7dI2joB3JdJZvpOWwLVzgY';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth:{ persistSession:false } });
const LOCAL_KEY = 'wtfhealth_v1';

let state = { entries: [], height: null, goal: null };
let pendingPhoto = null;

/* ============ helpers ============ */
const $ = id => document.getElementById(id);
const sorted = () => [...state.entries].sort((a,b)=> a.date.localeCompare(b.date));
const fmt = (n,d=1) => (n==null||isNaN(n)) ? '—' : Number(n).toFixed(d).replace(/\.0$/,'');
function avg(arr){ const v=arr.filter(x=>x!=null&&!isNaN(x)); return v.length ? v.reduce((s,x)=>s+Number(x),0)/v.length : null; }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function prettyDate(s){ return new Date(s+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'}); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); }

/* ============ DB mapping (no auth, single user) ============ */
function fromDB(r){
  return {
    id:r.id, date:r.entry_date,
    weight:r.weight_kg!=null?Number(r.weight_kg):null,
    waist:r.waist_cm!=null?Number(r.waist_cm):null,
    steps:r.steps!=null?Number(r.steps):null,
    water:r.water_l!=null?Number(r.water_l):null,
    sleep:r.sleep_hrs!=null?Number(r.sleep_hrs):null,
    energy:r.energy!=null?Number(r.energy):null,
    hunger:r.hunger!=null?Number(r.hunger):null,
    notes:r.notes||null, photo:r.photo_path||null
  };
}
function toRow(e){
  return {
    entry_date:e.date, weight_kg:e.weight, waist_cm:e.waist??null, steps:e.steps??null,
    water_l:e.water??null, sleep_hrs:e.sleep??null, energy:e.energy??null,
    hunger:e.hunger??null, notes:e.notes??null, photo_path:e.photo??null
  };
}

/* ============ data ops ============ */
async function refresh(){
  let loadErr=null;
  try{
    const [ent, set] = await Promise.all([
      sb.from('wtfhealth_entries').select('*').order('entry_date',{ascending:true}),
      sb.from('wtfhealth_settings').select('*').maybeSingle()
    ]);
    if(ent.error) throw ent.error;
    state.entries = (ent.data||[]).map(fromDB);
    if(set.error && set.error.code!=='PGRST116') throw set.error;
    if(set.data){ state.height=set.data.height_cm!=null?Number(set.data.height_cm):null; state.goal=set.data.goal_weight_kg!=null?Number(set.data.goal_weight_kg):null; }
  }catch(err){ loadErr=err; console.error('Load error:', err); }
  renderAll();
  showLoadError(loadErr);
}
function showLoadError(err){
  const bar=$('errBar');
  if(!err){ bar.classList.remove('on'); bar.innerHTML=''; return; }
  const msg=err.message||String(err);
  const missing=/does not exist|schema cache|find the table|relation/i.test(msg);
  bar.innerHTML = missing
    ? `<b>Tables not found.</b> Run the no-auth schema SQL in Supabase → SQL Editor, confirm <code>wtfhealth_entries</code> and <code>wtfhealth_settings</code> appear under Table Editor, then reload.<br><span style="opacity:.8">Raw error: ${msg}</span>`
    : `<b>Couldn't reach the database.</b> ${msg}`;
  bar.classList.add('on');
}
async function saveEntry(e){
  const { error } = await sb.from('wtfhealth_entries').upsert(toRow(e), { onConflict:'entry_date' });
  if(error){ console.error(error); toast('Save failed: '+error.message); return false; }
  return true;
}
async function deleteEntry(id){
  const { error } = await sb.from('wtfhealth_entries').delete().eq('id', id);
  if(error){ toast('Delete failed.'); return false; }
  return true;
}
async function saveSettings(){
  const { error } = await sb.from('wtfhealth_settings').upsert(
    { id:1, height_cm:state.height, goal_weight_kg:state.goal, updated_at:new Date().toISOString() },
    { onConflict:'id' });
  if(error){ toast('Setup save failed.'); return false; }
  return true;
}

/* ============ KPIs ============ */
function computeKpis(){
  const e = sorted();
  const w = e.map(x=>x.weight).filter(x=>x!=null);
  const first=w[0]??null, last=w[w.length-1]??null;
  const lost=(first!=null&&last!=null)?first-last:null;
  const pct=(lost!=null&&first)?(lost/first*100):null;
  let bmi=null; if(last!=null&&state.height){ const m=state.height/100; bmi=last/(m*m); }
  const toGoal=(state.goal!=null&&last!=null)?last-state.goal:null;
  let perWeek=null;
  if(e.length>1){ const span=daysBetween(e[0].date,e[e.length-1].date); if(span>0&&lost!=null) perWeek=lost/(span/7); }
  let weekChg=null;
  if(e.length>1&&last!=null){
    const target=new Date(e[e.length-1].date); target.setDate(target.getDate()-7);
    let ref=null; for(const x of e){ if(x.weight!=null&&new Date(x.date)<=target) ref=x.weight; }
    if(ref==null){ const fw=e.find(x=>x.weight!=null); ref=fw?fw.weight:null; }
    if(ref!=null) weekChg=last-ref;
  }
  const dates=new Set(e.map(x=>x.date));
  let streak=0, cur=new Date(); const today=new Date().toISOString().slice(0,10);
  if(!dates.has(today)) cur.setDate(cur.getDate()-1);
  while(dates.has(cur.toISOString().slice(0,10))){ streak++; cur.setDate(cur.getDate()-1); }
  const last7=e.slice(-7);
  const waistVals=e.map(x=>x.waist).filter(x=>x!=null);
  return { last,first,lost,pct,bmi,toGoal,perWeek,weekChg,streak,
    days:dates.size, steps:avg(last7.map(x=>x.steps)), sleep:avg(last7.map(x=>x.sleep)),
    water:avg(last7.map(x=>x.water)), energy:avg(last7.map(x=>x.energy)),
    waist:waistVals.length?waistVals[waistVals.length-1]:null, lowest:w.length?Math.min(...w):null };
}
function deltaTag(v,unit,goodIsDown=true){
  if(v==null||isNaN(v)) return '';
  const down=v<0; const cls=(down===goodIsDown)?'down':'up'; const arrow=v<0?'▼':(v>0?'▲':'·');
  return `<span class="delta ${cls}">${arrow} ${fmt(Math.abs(v),1)}${unit}</span>`;
}

/* ============ Insights ============ */
const INS_ICON = {
  down:'<path d="M3 17l6-6 4 4 8-8"/><path d="M21 13V7h-6"/>',
  flat:'<path d="M3 12h18"/>',
  pace:'<polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  low:'<path d="M4 22V4h13l-2 4 2 4H4"/>',
  habit:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  streak:'<path d="M8.5 14.5A4 4 0 0 0 14 11c0-1.5-.5-3-2-5 0 2-1 3-3 4-2 1-3 2.5-3 4.5a5 5 0 0 0 10 0c0-1-.3-2-1-3"/>',
  spark:'<path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/>'
};
function renderInsights(){
  const k=computeKpis(), e=sorted(), items=[];
  if(e.length<2){
    items.push(['spark','Log a couple more days and WTFHealth will start surfacing your trends here.']);
  } else {
    if(k.lost!=null){
      if(k.lost>0) items.push(['down',`You're down <b>${fmt(k.lost,1)} kg</b> from your starting ${fmt(k.first,1)} kg — about <b>${fmt(k.pct,1)}%</b> lighter.`]);
      else if(k.lost<0) items.push(['flat',`You're ${fmt(Math.abs(k.lost),1)} kg above your first entry. Fresh week, keep going.`]);
      else items.push(['flat',`You're right at your starting weight — momentum builds from here.`]);
    }
    if(k.perWeek!=null && k.perWeek>0){
      let s=`You're averaging about <b>${fmt(k.perWeek,1)} kg/week</b>.`;
      if(state.goal!=null && k.last>state.goal){
        const weeks=(k.last-state.goal)/k.perWeek;
        const d=new Date(e[e.length-1].date+'T00:00:00'); d.setDate(d.getDate()+Math.round(weeks*7));
        s+=` At this pace you'd reach ${fmt(state.goal,1)} kg around <b>${d.toLocaleDateString(undefined,{month:'long',day:'numeric'})}</b>.`;
      }
      items.push(['pace',s]);
    }
    if(k.lowest!=null) items.push(['low',`Lowest weight you've logged so far is <b>${fmt(k.lowest,1)} kg</b>.`]);
    const hb=[];
    if(k.steps!=null) hb.push(`${fmt(k.steps,0)} steps`);
    if(k.sleep!=null) hb.push(`${fmt(k.sleep,1)}h sleep`);
    if(k.water!=null) hb.push(`${fmt(k.water,1)}L water`);
    if(hb.length) items.push(['habit',`Over your last week you're averaging ${hb.join(', ')} a day.`]);
    if(k.streak>1) items.push(['streak',`<b>${k.streak}-day</b> logging streak — that consistency is what makes everything else work.`]);
  }
  $('insightsList').innerHTML = items.map(([t,txt])=>`
    <div class="ins"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${INS_ICON[t]||INS_ICON.spark}</svg></div><p>${txt}</p></div>`).join('');
}

/* ============ KPI render ============ */
function renderKpis(){
  const k=computeKpis(); const c=[];
  c.push(`<div class="kpi hero"><div class="lab"><i></i>Total lost so far</div><div class="val tnum">${k.lost!=null?fmt(k.lost,1):'—'}<u>kg</u></div><div class="sub">${k.pct!=null?fmt(k.pct,1)+'% of starting weight':'Log a few days to see progress'}</div></div>`);
  const card=(lab,val,unit,sub)=>`<div class="kpi"><div class="lab"><i></i>${lab}</div><div class="val tnum">${val}${unit?`<u>${unit}</u>`:''}</div><div class="sub">${sub||''}</div></div>`;
  c.push(card('Current weight',k.last!=null?fmt(k.last,1):'—','kg',k.lowest!=null?`Lowest: ${fmt(k.lowest,1)} kg`:''));
  c.push(card('Starting weight',k.first!=null?fmt(k.first,1):'—','kg','Your first entry'));
  c.push(card('BMI',k.bmi!=null?fmt(k.bmi,1):'—','',k.bmi!=null?'From height + weight':'Add height in Setup'));
  c.push(card('To goal',k.toGoal!=null?fmt(Math.max(k.toGoal,0),1):'—',k.toGoal!=null?'kg':'',state.goal!=null?`Target ${fmt(state.goal,1)} kg`:'Set a goal in Setup'));
  c.push(card('This week',k.weekChg!=null?deltaTag(k.weekChg,'kg'):'—','','vs ~7 days ago'));
  c.push(card('Avg / week',k.perWeek!=null?deltaTag(k.perWeek,'kg'):'—','','Across all entries'));
  c.push(card('Days tracked',k.days||0,'',k.days===1?'Keep it going':'entries logged'));
  c.push(card('Logging streak',k.streak,'',k.streak===1?'day':'days in a row'));
  c.push(card('Avg steps',k.steps!=null?fmt(k.steps,0):'—','','Last 7 entries'));
  c.push(card('Avg sleep',k.sleep!=null?fmt(k.sleep,1):'—','hrs','Last 7 entries'));
  c.push(card('Avg water',k.water!=null?fmt(k.water,1):'—','L','Last 7 entries'));
  c.push(card('Avg energy',k.energy!=null?fmt(k.energy,1):'—','/5','Last 7 entries'));
  c.push(card('Latest waist',k.waist!=null?fmt(k.waist,1):'—','cm','Often moves before the scale'));
  $('kpis').innerHTML=c.join('');
}

/* ============ chart ============ */
function renderChart(){
  const svg=$('chart'); const e=sorted().filter(x=>x.weight!=null);
  const W=1000,H=230,pad={t:18,r:46,b:26,l:14};
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const last=e.length?e[e.length-1].weight:null;
  $('chartNow').innerHTML=last!=null?`${fmt(last,1)}<u> kg</u>`:'—';
  if(e.length<2){ $('chartMeta').textContent='';
    svg.innerHTML=`<text x="${W/2}" y="${H/2}" text-anchor="middle" class="axlab" font-size="15" fill="#9aa5ad">Log at least two weigh-ins to draw your curve</text>`; return; }
  const vals=e.map(x=>x.weight); let min=Math.min(...vals),max=Math.max(...vals);
  if(min===max){min-=1;max+=1;} const range=max-min,padR=range*0.18; min-=padR; max+=padR;
  const x=i=>pad.l+(i/(e.length-1))*(W-pad.l-pad.r);
  const y=v=>pad.t+(1-(v-min)/(max-min))*(H-pad.t-pad.b);
  let grid=''; const ticks=4;
  for(let i=0;i<=ticks;i++){ const v=min+(i/ticks)*(max-min),yy=y(v);
    grid+=`<line class="gl" x1="${pad.l}" y1="${yy.toFixed(1)}" x2="${W-pad.r}" y2="${yy.toFixed(1)}"/>`;
    grid+=`<text class="axlab" x="${W-pad.r+6}" y="${(yy+3.5).toFixed(1)}">${fmt(v,0)}</text>`; }
  const pts=e.map((p,i)=>[x(i),y(p.weight)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M ${pts[0][0].toFixed(1)} ${(H-pad.b).toFixed(1)} `+pts.map(p=>`L ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ')+` L ${pts[pts.length-1][0].toFixed(1)} ${(H-pad.b).toFixed(1)} Z`;
  const iMax=vals.indexOf(Math.max(...vals)),iMin=vals.indexOf(Math.min(...vals));
  const dot=i=>`<circle cx="${x(i).toFixed(1)}" cy="${y(vals[i]).toFixed(1)}" r="3.4" fill="#fff" stroke="var(--accent)" stroke-width="2"/>`;
  const lp=pts[pts.length-1];
  svg.innerHTML=`<defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#14A38B" stop-opacity="0.22"/><stop offset="100%" stop-color="#14A38B" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#fill)"/><path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${dot(iMax)} ${dot(iMin)}<circle cx="${lp[0].toFixed(1)}" cy="${lp[1].toFixed(1)}" r="4.5" fill="var(--accent)"/><circle cx="${lp[0].toFixed(1)}" cy="${lp[1].toFixed(1)}" r="8.5" fill="var(--accent)" opacity="0.16"/>
    <text class="axlab" x="${pad.l}" y="${H-6}">${prettyDate(e[0].date)}</text><text class="axlab" x="${W-pad.r}" y="${H-6}" text-anchor="end">${prettyDate(e[e.length-1].date)}</text>`;
  const span=daysBetween(e[0].date,e[e.length-1].date);
  $('chartMeta').innerHTML=`${e.length} weigh-ins · ${span} day${span===1?'':'s'}<br>high ${fmt(Math.max(...vals),1)} · low ${fmt(Math.min(...vals),1)} kg`;
}

/* ============ goal bar + activity ============ */
function renderGoalBar(){
  const el=$('goalBar'); const k=computeKpis();
  if(state.goal==null||k.first==null||k.last==null){ el.innerHTML=`<div class="viz-empty">Set a goal weight in <b>Setup</b> to track progress toward it.</div>`; return; }
  const start=k.first,goal=state.goal,curw=k.last,total=start-goal;
  let pct=total!==0?(start-curw)/total:0; pct=Math.max(0,Math.min(1,pct));
  el.innerHTML=`<div class="gb-top"><span>${fmt(start,1)} kg</span><span class="gb-cur">${fmt(curw,1)} kg now</span><span>${fmt(goal,1)} kg</span></div>
    <div class="gb-track"><div class="gb-fill" style="width:${(pct*100).toFixed(1)}%"></div><div class="gb-marker" style="left:${(pct*100).toFixed(1)}%"></div></div>
    <div class="gb-sub"><b>${fmt(pct*100,0)}%</b> of the way there · <b>${fmt(Math.max(curw-goal,0),1)} kg</b> to go</div>`;
}
function renderActivity(){
  const el=$('activityBars'); const e=sorted().slice(-7).filter(x=>x.steps!=null);
  if(!e.length){ el.innerHTML=`<div class="viz-empty">Log your steps and your weekly activity shows up here.</div>`; return; }
  const max=Math.max(...e.map(x=>x.steps),1);
  el.innerHTML=`<div class="ab">`+e.map(x=>{
    const h=Math.max(6,(x.steps/max)*100);
    const k=x.steps>=10000?(x.steps/1000).toFixed(0):(x.steps/1000).toFixed(1);
    return `<div class="ab-col"><div class="ab-bar" style="height:${h.toFixed(0)}%"><span>${k}k</span></div><div class="ab-lab">${new Date(x.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'narrow'})}</div></div>`;
  }).join('')+`</div>`;
}

/* ============ history ============ */
function renderHistory(){
  const e=sorted();
  $('histCount').textContent=e.length?`${e.length} entr${e.length===1?'y':'ies'}`:'';
  if(!e.length){ $('histList').innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg><p>No entries yet</p><span>Save your first weigh-in to start the chart.</span></div>`; return; }
  $('histList').innerHTML=[...e].reverse().map(x=>{
    const idx=e.indexOf(x), prev=idx>0?e[idx-1].weight:null; let chg='';
    if(prev!=null&&x.weight!=null){ const d=x.weight-prev,cls=d<0?'down':(d>0?'up':''),sign=d>0?'+':''; chg=`<div class="chg ${cls}">${sign}${fmt(d,1)}<small>kg</small></div>`; }
    else chg=`<div class="chg"><small>start</small></div>`;
    const tags=[];
    if(x.steps!=null) tags.push(`${Number(x.steps).toLocaleString()} steps`);
    if(x.sleep!=null) tags.push(`${fmt(x.sleep,1)}h sleep`);
    if(x.water!=null) tags.push(`${fmt(x.water,1)}L water`);
    if(x.waist!=null) tags.push(`${fmt(x.waist,1)}cm waist`);
    if(x.energy) tags.push(`energy ${x.energy}/5`);
    if(x.hunger) tags.push(`hunger ${x.hunger}/5`);
    const thumb=x.photo?`<img class="thumb" src="${x.photo}" alt="Photo ${x.date}" data-photo="${x.id}"/>`:`<div class="thumb ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg></div>`;
    return `<div class="row">${thumb}<div class="info"><div class="w tnum">${x.weight!=null?fmt(x.weight,1):'—'}<u> kg</u></div><div class="d">${prettyDate(x.date)}</div>${tags.length?`<div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}</div><div style="display:flex;align-items:center;gap:8px">${chg}<button class="del" data-del="${x.id}" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div></div>`;
  }).join('');
}

function renderAll(){ renderInsights(); renderKpis(); renderChart(); renderGoalBar(); renderActivity(); renderHistory(); }

/* ============ image compression ============ */
function compressImage(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{ const img=new Image();
    img.onload=()=>{ const max=600; let{width:w,height:h}=img;
      if(w>h&&w>max){h=h*max/w;w=max;} else if(h>max){w=w*max/h;h=max;}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h); cb(c.toDataURL('image/jpeg',0.72)); };
    img.onerror=()=>cb(null); img.src=ev.target.result; };
  reader.readAsDataURL(file);
}

/* ============ scale pickers ============ */
function setupScale(el){ el.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  const n=b.dataset.n, already=el.dataset.val===n; el.dataset.val=already?'0':n;
  el.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  if(!already) el.querySelectorAll('button').forEach(x=>{ if(+x.dataset.n<=+n) x.classList.add('on'); }); })); }
function readScale(el){ const v=+el.dataset.val; return v||null; }
function resetScale(el){ el.dataset.val='0'; el.querySelectorAll('button').forEach(x=>x.classList.remove('on')); }

/* ============ migration from old localStorage ============ */
function checkMigration(){
  if(localStorage.getItem('wtfhealth_migrated')) return;
  let local=null; try{ local=JSON.parse(localStorage.getItem(LOCAL_KEY)||'null'); }catch(e){}
  if(local && local.entries && local.entries.length){
    $('migrateText').textContent=`Found ${local.entries.length} entr${local.entries.length===1?'y':'ies'} saved on this device. Import them into the database?`;
    $('migrateBar').classList.remove('hidden');
    $('migrateBtn').onclick=async()=>{
      $('migrateBtn').disabled=true;
      const rows=local.entries.map(e=>toRow({ date:e.date,weight:e.weight,waist:e.waist,steps:e.steps,water:e.water,sleep:e.sleep,energy:e.energy,hunger:e.hunger,notes:e.notes,photo:e.photo }));
      const { error } = await sb.from('wtfhealth_entries').upsert(rows,{ onConflict:'entry_date' });
      if(!error && (local.height!=null||local.goal!=null)){ state.height=local.height??null; state.goal=local.goal??null; await saveSettings(); }
      if(error){ toast('Import failed: '+error.message); $('migrateBtn').disabled=false; return; }
      localStorage.setItem('wtfhealth_migrated','1');
      $('migrateBar').classList.add('hidden'); await refresh(); toast('Local data imported.');
    };
    $('migrateDismiss').onclick=()=>{ localStorage.setItem('wtfhealth_migrated','1'); $('migrateBar').classList.add('hidden'); };
  }
}

  document.body.appendChild(d);

}

/* ============ wiring ============ */
function wireApp(){
  $('f_date').value=new Date().toISOString().slice(0,10);
  setupScale($('f_energy')); setupScale($('f_hunger'));

  $('f_photo').addEventListener('change',e=>{ const file=e.target.files[0];
    if(!file){ pendingPhoto=null; $('f_preview').style.display='none'; return; }
    compressImage(file,data=>{ pendingPhoto=data; if(data){ $('f_previewImg').src=data; $('f_preview').style.display='block'; } }); });

  $('saveBtn').addEventListener('click',async()=>{
    const date=$('f_date').value, weight=parseFloat($('f_weight').value);
    if(!date){ toast('Pick a date first.'); return; }
    if(isNaN(weight)){ toast('Enter your weight to save.'); $('f_weight').focus(); return; }
    const num=id=>{ const v=parseFloat($(id).value); return isNaN(v)?null:v; };
    const stepsV=parseInt($('f_steps').value);
    const entry={ date,weight, waist:num('f_waist'), steps:isNaN(stepsV)?null:stepsV, water:num('f_water'), sleep:num('f_sleep'), energy:readScale($('f_energy')), hunger:readScale($('f_hunger')), notes:$('f_notes').value.trim()||null, photo:pendingPhoto };
    $('saveBtn').disabled=true;
    const ok=await saveEntry(entry); $('saveBtn').disabled=false;
    if(!ok) return;
    await refresh(); toast('Entry saved.');
    ['f_weight','f_waist','f_steps','f_water','f_sleep','f_notes'].forEach(id=>$(id).value='');
    resetScale($('f_energy')); resetScale($('f_hunger')); pendingPhoto=null; $('f_photo').value=''; $('f_preview').style.display='none'; $('f_weight').focus();
  });

  $('histList').addEventListener('click',async e=>{
    const del=e.target.closest('[data-del]');
    if(del){ if(confirm('Delete this entry?')){ if(await deleteEntry(del.dataset.del)){ await refresh(); } } return; }
    const ph=e.target.closest('[data-photo]');
    if(ph){ const entry=state.entries.find(x=>x.id===ph.dataset.photo);
      if(entry&&entry.photo){ $('lbImg').src=entry.photo; $('lbCap').textContent=`${fmt(entry.weight,1)} kg · ${prettyDate(entry.date)}`; $('lightbox').classList.add('on'); } }
  });
  $('lightbox').addEventListener('click',()=>$('lightbox').classList.remove('on'));

  const dlg=$('settingsDlg');
  $('settingsBtn').addEventListener('click',()=>{ $('s_height').value=state.height??''; $('s_goal').value=state.goal??''; dlg.showModal(); });
  $('settingsCancel').addEventListener('click',()=>dlg.close());
  $('settingsSave').addEventListener('click',async()=>{
    const h=parseFloat($('s_height').value),g=parseFloat($('s_goal').value);
    state.height=isNaN(h)?null:h; state.goal=isNaN(g)?null:g;
    if(await saveSettings()){ renderAll(); dlg.close(); toast('Setup saved.'); }
  });

  $('exportBtn').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='wtfhealth-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href);
  });
}

/* ============ boot ============ */
function init(){
  if(location.protocol==='file:') showFileWarning();
  wireApp();
  refresh();
  checkMigration();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
